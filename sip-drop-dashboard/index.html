  a.sessions.forEach(s=>{
    const sred=s.ib>1;
    h+=`<div class="sess">Session <b>${esc(s.sid)}</b> &middot; ${esc(s.login)} &rarr; ${esc(s.logout)} &middot; breaks: <b${sred?' style="color:#fca5a5"':''}>${s.ib}</b></div>`;
    h+='<table><thead><tr><th>Campaign</th><th>Job Attach</th><th>Job Detach</th><th class="num">Calls</th><th class="num">Talk (min)</th><th class="num">Breaks</th></tr></thead><tbody>';
    s.jobs.forEach(j=>{
      const red=j.ib>1;
      h+=`<tr class="${red?'red':''}"><td>${esc(j.camp)}</td><td>${esc(j.attach)}</td><td>${esc(j.detach)}</td><td class="num">${j.cc}</td><td class="num">${fmtMin(j.talk)}</td><td class="num"><span class="${red?'b':''}">${j.ib}</span></td></tr>`;
    });
    h+='</tbody></table>';
  });
  return h;
}
function render(){
  let list=A.filter(a=>(!query||a.name.toLowerCase().includes(query.toLowerCase())||a.ext.includes(query))&&(!onlyRed||a.redjobs>0));
  list.sort(sorters[sortKey]||sorters.ib);
  const tb=document.getElementById('tbody');tb.innerHTML='';
  list.forEach((a,i)=>{
    const tr=document.createElement('tr');tr.className='clickable';
    const isMatch=a.ib===a.drops100;
    tr.innerHTML=`<td class="rank">${i+1}</td>
      <td><span class="caret">&#9656;</span> <span class="agent">${hl(a.name)}</span> <span class="ext">${hl('#'+a.ext)}</span></td>
      <td class="num"><b>${a.ib}</b></td>
      <td class="num">${a.drops100}</td>
      <td>${isMatch?'<span class="match">&#10003; equal</span>':'<span class="nomatch">&Delta; '+(a.drops100-a.ib)+'</span>'}</td>
      <td class="num">${a.jobs}</td>
      <td class="num">${fmtMin(a.talk)}</td>
      <td class="num">${a.redjobs?'<span class="redbadge">'+a.redjobs+'</span>':'0'}</td>`;
    const det=document.createElement('tr');det.className='detail';det.style.display='none';
    det.innerHTML=`<td></td><td colspan="7">${detailHTML(a)}</td>`;
    tr.onclick=()=>{const open=det.style.display!=='none';det.style.display=open?'none':'';tr.classList.toggle('open',!open);};
    tb.appendChild(tr);tb.appendChild(det);
  });
  document.getElementById('showing').textContent=list.length+' of '+A.length+' agents';
  document.getElementById('foot').innerHTML='<span class="legend"></span> Red = a job where the nailer (sip:100@zain.com) dropped more than once within the same Job Attach&ndash;Detach window. Durations shown in minutes. Click a row to expand sessions &amp; jobs.';
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim();render();});
document.getElementById('sortSel').addEventListener('change',e=>{sortKey=e.target.value;render();});
document.getElementById('onlyRed').addEventListener('change',e=>{onlyRed=e.target.checked;render();});
document.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{sortKey=th.dataset.k;document.getElementById('sortSel').value=['ib','drops100','red','talk','name'].includes(sortKey)?sortKey:'ib';render();}));
render();
</script>
</body>
</html>
