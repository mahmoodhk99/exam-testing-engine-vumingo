<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP Drop Dashboard &mdash; sip:100@zain.com</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--text:#e2e8f0;--muted:#94a3b8;
        --accent:#38bdf8;--accent2:#f472b6;--bar:#38bdf8;--good:#34d399;--warn:#fbbf24;--border:#334155;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);}
  header{padding:22px 26px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#0b1220,#12203a);}
  h1{margin:0;font-size:20px;font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .wrap{max-width:1200px;margin:0 auto;padding:22px 26px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
  .card .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:26px;font-weight:700;margin-top:6px}
  .card .v.small{font-size:15px;font-weight:600}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:22px}
  .panel h2{margin:0 0 14px;font-size:15px;font-weight:600}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  input[type=search]{background:var(--card2);border:1px solid var(--border);color:var(--text);
        padding:9px 12px;border-radius:8px;font-size:14px;flex:1;min-width:200px}
  select{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card)}
  th:hover{color:var(--text)}
  tbody tr:hover{background:var(--card2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .barcell{position:relative}
  .barwrap{background:var(--card2);border-radius:5px;height:22px;position:relative;overflow:hidden;min-width:80px}
  .bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,#0ea5e9,#38bdf8);border-radius:5px}
  .barlabel{position:absolute;left:8px;top:0;line-height:22px;font-size:12px;font-weight:600}
  .rank{color:var(--muted);width:34px}
  .agent{font-weight:600}
  .ext{color:var(--muted);font-size:12px}
  .detail{background:var(--bg)}
  .detail table{font-size:12px}
  .detail td{border-bottom:1px solid #1c2637;color:var(--muted)}
  .clickable{cursor:pointer}
  .caret{display:inline-block;width:14px;color:var(--muted);transition:transform .15s}
  tr.open .caret{transform:rotate(90deg)}
  .foot{color:var(--muted);font-size:12px;margin-top:8px}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:999px;padding:2px 10px;font-size:12px;color:var(--muted)}
  mark{background:var(--warn);color:#111;border-radius:3px}
</style>
</head>
<body>
<header>
  <h1>&#128246; SIP Drop Dashboard</h1>
  <div class="sub">Calls from <b>sip:100@zain.com</b> dropped by the agent (Far End Disconnect) &mdash; grouped per agent</div>
</header>
<div class="wrap">
  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>Drops per agent</h2>
    <div class="toolbar">
      <input type="search" id="q" placeholder="Search agent name or extension&hellip;">
      <select id="sortSel">
        <option value="drops">Sort: Most drops</option>
        <option value="dropsAsc">Sort: Fewest drops</option>
        <option value="name">Sort: Agent name</option>
        <option value="avg">Sort: Avg duration</option>
      </select>
      <span class="pill" id="showing"></span>
    </div>
    <table id="tbl">
      <thead>
        <tr>
          <th class="rank">#</th>
          <th data-k="name">Agent</th>
          <th class="num" data-k="drops">Drops</th>
          <th style="width:220px">Share</th>
          <th class="num" data-k="total">Total talk (s)</th>
          <th class="num" data-k="avg">Avg (s)</th>
          <th class="num" data-k="short">&le;5s drops</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="foot" id="foot"></div>
  </div>
</div>

<script>
const DATA = __DATA__;
const calls = DATA.calls;

// aggregate per agent
const map = new Map();
for(const c of calls){
  let a = map.get(c.e);
  if(!a){ a = {ext:c.e, name:c.n, drops:0, total:0, short:0, rows:[]}; map.set(c.e,a); }
  a.drops++; a.total += c.d; if(c.d<=5) a.short++; a.rows.push(c);
}
let agents = [...map.values()];
for(const a of agents){ a.avg = a.drops? a.total/a.drops : 0; a.rows.sort((x,y)=>x.t<y.t?1:-1); }
const maxDrops = Math.max(...agents.map(a=>a.drops));
const totalDrops = calls.length;
const totalShort = agents.reduce((s,a)=>s+a.short,0);

// summary cards
const topA = [...agents].sort((a,b)=>b.drops-a.drops)[0];
document.getElementById('cards').innerHTML = [
  ['Total drops', totalDrops.toLocaleString()],
  ['Agents involved', agents.length],
  ['Top agent', topA.name+' &middot; '+topA.drops, true],
  ['Quick drops (&le;5s)', totalShort.toLocaleString()],
  ['Date period', DATA.period, true],
].map(([k,v,small])=>`<div class="card"><div class="k">${k}</div><div class="v${small?' small':''}">${v}</div></div>`).join('');

let sortKey='drops', query='';
function fmt(n){ return Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }
function esc(s){ return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function hl(s){ if(!query) return esc(s); const i=s.toLowerCase().indexOf(query.toLowerCase());
  if(i<0) return esc(s); return esc(s.slice(0,i))+'<mark>'+esc(s.slice(i,i+query.length))+'</mark>'+esc(s.slice(i+query.length)); }

function render(){
  let list = agents.filter(a=> !query || a.name.toLowerCase().includes(query.toLowerCase()) || a.ext.includes(query));
  const sorters = {
    drops:(a,b)=>b.drops-a.drops||a.name.localeCompare(b.name),
    dropsAsc:(a,b)=>a.drops-b.drops||a.name.localeCompare(b.name),
    name:(a,b)=>a.name.localeCompare(b.name),
    avg:(a,b)=>b.avg-a.avg,
  };
  list.sort(sorters[sortKey]||sorters.drops);
  const tb=document.getElementById('tbody'); tb.innerHTML='';
  list.forEach((a,i)=>{
    const tr=document.createElement('tr'); tr.className='clickable';
    const w=Math.round(a.drops/maxDrops*100);
    tr.innerHTML=`<td class="rank">${i+1}</td>
      <td><span class="caret">&#9656;</span> <span class="agent">${hl(a.name)}</span> <span class="ext">${hl('#'+a.ext)}</span></td>
      <td class="num"><b>${a.drops}</b></td>
      <td class="barcell"><div class="barwrap"><div class="bar" style="width:${w}%"></div></div></td>
      <td class="num">${fmt(a.total)}</td>
      <td class="num">${a.avg.toFixed(1)}</td>
      <td class="num">${a.short}</td>`;
    const det=document.createElement('tr'); det.className='detail'; det.style.display='none';
    det.innerHTML=`<td></td><td colspan="6"><table><thead><tr><th>Start time</th><th>Destination</th><th class="num">Duration (s)</th><th>End detail</th></tr></thead><tbody>`
      + a.rows.map(r=>`<tr><td>${esc(r.t)}</td><td>sip:${r.e}@zain.com</td><td class="num">${r.d}</td><td>${esc(r.r)}</td></tr>`).join('')
      + `</tbody></table></td>`;
    tr.onclick=()=>{ const open=det.style.display!=='none'; det.style.display=open?'none':''; tr.classList.toggle('open',!open); };
    tb.appendChild(tr); tb.appendChild(det);
  });
  document.getElementById('showing').textContent = list.length+' of '+agents.length+' agents';
  document.getElementById('foot').textContent = 'A drop = a call from '+DATA.origin+' that the agent (far end) disconnected. Click a row to see individual calls.';
}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim();render();});
document.getElementById('sortSel').addEventListener('change',e=>{sortKey=e.target.value;render();});
document.querySelectorAll('th[data-k]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; sortKey = (k==='drops')?'drops':k; document.getElementById('sortSel').value = (k==='drops')?'drops':(k==='name'?'name':(k==='avg'?'avg':'drops')); render();
}));
render();
</script>
</body>
</html>
